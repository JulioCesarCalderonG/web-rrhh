<mat-card class="mb-1">
    <mat-card-content>
        <table mat-table [dataSource]="dataSource">

            <ng-container *ngFor="let col of columnas" [matColumnDef]="col.campo">
                <th mat-header-cell *matHeaderCellDef>
                    {{ col.titulo }}
                </th>
                <td mat-cell *matCellDef="let row">
                    {{ row[col.campo] }}
                </td>
            </ng-container>

            <!-- Acciones -->
            <ng-container matColumnDef="acciones" class="text-center">
                <th mat-header-cell *matHeaderCellDef> Acciones </th>
                <td mat-cell *matCellDef="let row">
                    <button type="button" class="btn btn-info" data-toggle="modal" data-target="#modificarPersonal"
                        data-whatever="@mdo" (click)="editar.emit(row)">
                        <i class="fa fa-pencil"></i>
                    </button>
                    <!-- <button mat-button color="primary" (click)="editar.emit(row)">Editar</button> -->
                    <!-- <button mat-button color="warn" (click)="eliminar.emit(row)">Eliminar</button> -->
                    <button *ngIf="row.estado===1" type="button" class="btn btn-secondary" (click)="eliminar.emit(row)">
                        <i class="fa fa-lock"></i>
                    </button>
                    <button *ngIf="row.estado===1" type="button" class="btn btn-secondary" (click)="eliminar.emit(row)">
                        <i class="fa fa-lock"></i>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>

        <mat-paginator
  [length]="totalRegistros"
  [pageSize]="pageSize"
  [pageSizeOptions]="pageSizeOptions"
  (page)="onPageChange($event)">
</mat-paginator>
    </mat-card-content>
</mat-card>
