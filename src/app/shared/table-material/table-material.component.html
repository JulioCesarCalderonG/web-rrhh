<mat-card class="mb-1">
    <mat-card-content>
        <div class="tabla-container">
            <table mat-table [dataSource]="dataSource">

                <ng-container *ngFor="let col of columnas" [matColumnDef]="col.campo">
                    <th mat-header-cell *matHeaderCellDef>
                        {{ col.titulo }}
                    </th>
                    <td mat-cell *matCellDef="let row">
                        {{ getValor(row, col.campo) }}
                    </td>
                </ng-container>

                <!-- Acciones -->
                <ng-container  matColumnDef="acciones" class="text-center">
                    <th mat-header-cell *matHeaderCellDef> Acciones </th>
                    <td mat-cell *matCellDef="let row">
                        <button *ngIf="tipo==1" type="button" class="btn btn-info" data-toggle="modal"
                            data-target="#modalEditar" data-whatever="@mdo" (click)="editar.emit(row)">
                            <i class="fa fa-pencil"></i>
                        </button>
                        <button *ngIf="tipo==1" type="button" class="btn btn-danger" (click)="eliminar.emit(row)">
                            <i class="fa fa-trash"></i>
                        </button>
                        <button *ngIf="tipo==2" type="button" class="btn btn-danger" (click)="reporte.emit(row)">
                            <i class="fa fa-eye"></i>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>
        </div>
        <mat-paginator [length]="totalRegistros" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions"
            (page)="onPageChange($event)">
        </mat-paginator>
    </mat-card-content>
</mat-card>
